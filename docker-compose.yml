x-common: &kafka-image
  image: apache/kafka:4.1.1

services:
  kafka-1:
    <<: *kafka-image
    restart: always
    ports:
      - "${KAFKA_1_EXPOSED_PORT}:9092"
    environment:
      - KAFKA_NODE_ID=1
      - CLUSTER_ID=${KAFKA_CLUSTER_ID}
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-1:9091, 2@kafka-2:9091, 3@kafka-3:9091
      - KAFKA_LISTENERS=INTERNAL://:9090, CONTROLLER://:9091, EXTERNAL://:9092
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka-1:9090, EXTERNAL://${HOSTNAME:-localhost}:${KAFKA_1_EXPOSED_PORT}
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT, EXTERNAL:PLAINTEXT, INTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka-1:9090" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  kafka-2:
    <<: *kafka-image
    restart: always
    ports:
      - "${KAFKA_2_EXPOSED_PORT}:9094"
    environment:
      - KAFKA_NODE_ID=2
      - CLUSTER_ID=${KAFKA_CLUSTER_ID}
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-1:9091, 2@kafka-2:9091, 3@kafka-3:9091
      - KAFKA_LISTENERS=INTERNAL://:9090, CONTROLLER://:9091, EXTERNAL://:9094
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka-2:9090, EXTERNAL://${HOSTNAME:-localhost}:${KAFKA_2_EXPOSED_PORT}
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT, EXTERNAL:PLAINTEXT, INTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka-2:9090" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s


  kafka-3:
    <<: *kafka-image
    restart: always
    ports:
      - "${KAFKA_3_EXPOSED_PORT}:9096"
    environment:
      - KAFKA_NODE_ID=3
      - CLUSTER_ID=${KAFKA_CLUSTER_ID}
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-1:9091, 2@kafka-2:9091, 3@kafka-3:9091
      - KAFKA_LISTENERS=INTERNAL://:9090, CONTROLLER://:9091, EXTERNAL://:9096
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka-3:9090, EXTERNAL://${HOSTNAME:-localhost}:${KAFKA_3_EXPOSED_PORT}
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT, EXTERNAL:PLAINTEXT, INTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka-3:9090" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
